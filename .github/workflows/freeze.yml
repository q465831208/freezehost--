name: 🎮 FreezeHost 自动续期

on:
  schedule:
    - cron: '30 6 */10 * *'
  workflow_dispatch:

jobs:
  renew:
    name: 🔄 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TZ: Asia/Shanghai
      DISCORD_ACCOUNT: ${{ secrets.DISCORD_ACCOUNT }}
      TG_BOT: ${{ secrets.TG_BOT }}
      GOST_PROXY_SECRET: ${{ secrets.GOST_PROXY }}

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📋 显示版本
        run: |
          node -v
          npm -v

      - name: 📦 安装依赖
        run: npm install

      - name: 🌐 安装 Playwright 浏览器
        run: npx playwright install chromium --with-deps

      - name: ✅ 检查 Secrets
        run: |
          test -n "$DISCORD_ACCOUNT" || (echo "❌ 缺少 DISCORD_ACCOUNT" && exit 1)
          test -n "$TG_BOT" || (echo "❌ 缺少 TG_BOT" && exit 1)
          echo "✅ Secrets 检查通过"

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY_SECRET != '' }}
        shell: bash
        run: |
          set -e

          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"

          wget -q -O gost.gz "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost-linux-amd64-${VERSION}.gz"
          gunzip -f gost.gz
          chmod +x gost
          sudo mv gost /usr/local/bin/gost

          nohup gost -L=:8080 -F="$GOST_PROXY_SECRET" > gost.log 2>&1 &
          sleep 3

          echo "✅ GOST 已启动，测试连通性..."
          curl --socks5-hostname 127.0.0.1:8080 -s https://api.ipify.org | sed 's/\.[0-9]*$/.**/' && echo

      - name: 🚀 运行续期脚本
        env:
          GOST_PROXY: http://127.0.0.1:8080
        run: npx playwright test

      - name: 📊 上传 Playwright 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: 🧾 上传调试文件
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freezehost-artifacts
          path: artifacts/
          if-no-files-found: ignore
          retention-days: 7

      - name: 📸 上传测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: 📜 失败时输出 GOST 日志
        if: failure()
        run: |
          echo "===== gost.log ====="
          cat gost.log || true
