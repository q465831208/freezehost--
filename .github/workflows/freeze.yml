name: 🎮 FreezeHost 自动续期

on:
  schedule:
    - cron: '30 6 */10 * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TZ: Asia/Shanghai
      DISCORD_ACCOUNT: ${{ secrets.DISCORD_ACCOUNT }}
      TG_BOT: ${{ secrets.TG_BOT }}
      GOST_PROXY_SECRET: ${{ secrets.GOST_PROXY }}

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 安装依赖
        run: npm install

      - name: 🌐 安装 Playwright
        run: npx playwright install chromium --with-deps

      - name: ✅ 检查 Secrets
        run: |
          test -n "$DISCORD_ACCOUNT" || (echo "❌ 缺少 DISCORD_ACCOUNT" && exit 1)
          echo "✅ 基础 Secrets OK"

      # ===============================
      # 🛡️ GOST 自动代理（核心）
      # ===============================
      - name: 🛡️ 启动 GOST 代理（自动适配）
        if: ${{ env.GOST_PROXY_SECRET != '' }}
        shell: bash
        run: |
          set -e

          echo "📦 获取 GOST 版本..."
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v' || echo "2.12.0")
          echo "👉 使用版本: $VERSION"

          echo "📥 下载 GOST..."
          URL="https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost-linux-amd64-${VERSION}.gz"
          PROXY_URL="https://ghproxy.com/${URL}"

          curl -L --fail -o gost.gz "$URL" || \
          curl -L --fail -o gost.gz "$PROXY_URL"

          gunzip -f gost.gz
          chmod +x gost
          sudo mv gost /usr/local/bin/gost

          echo "🚀 启动 GOST..."
          echo "代理: $GOST_PROXY_SECRET"

          nohup gost -L=:8080 -F="$GOST_PROXY_SECRET" > gost.log 2>&1 &
          sleep 5

          echo "📜 GOST 日志："
          cat gost.log || true

          echo "🌐 测试代理..."

          echo "👉 SOCKS5 测试:"
          curl --socks5-hostname 127.0.0.1:8080 -s --max-time 10 https://api.ipify.org && echo || echo "❌ SOCKS5失败"

          echo "👉 HTTP 测试:"
          curl -x http://127.0.0.1:8080 -s --max-time 10 https://api.ipify.org && echo || echo "❌ HTTP失败"

      # ===============================
      # 🚀 运行脚本
      # ===============================
      - name: 🚀 执行续期脚本
        env:
          HTTP_PROXY: http://127.0.0.1:8080
          HTTPS_PROXY: http://127.0.0.1:8080
        run: |
          echo "🌍 当前出口IP:"
          curl -s https://api.ipify.org || true
          echo

          npx playwright test

      # ===============================
      # 📊 调试输出
      # ===============================
      - name: 📜 失败时输出 GOST 日志
        if: failure()
        run: |
          echo "===== gost.log ====="
          cat gost.log || true

      - name: 📦 上传报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            playwright-report/
            test-results/
            gost.log
          if-no-files-found: ignore
