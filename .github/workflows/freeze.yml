name: 🎮 FreezeHost 自动续期

on:
  schedule:
    - cron: '30 6 */10 * *'
  workflow_dispatch:

jobs:
  renew:
    name: 🔄 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TZ: Asia/Shanghai

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 安装依赖
        run: npm install

      - name: 🌐 安装 Playwright 浏览器
        run: npx playwright install chromium --with-deps

      # ===============================
      # 🛡️ GOST（精简稳定版）
      # ===============================
      - name: 🛡️ 启动 GOST 代理
        if: ${{ secrets.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          set -e

          echo "📦 获取 GOST 版本..."
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')

          # fallback（关键！）
          if [ -z "$VERSION" ]; then
            VERSION="2.12.0"
            echo "⚠️ 使用默认版本: $VERSION"
          fi

          echo "📥 下载 GOST..."
          FILE="gost_${VERSION}_linux_amd64.tar.gz"
          URL="https://github.com/ginuerzh/gost/releases/download/v${VERSION}/${FILE}"

          wget -q "$URL" || wget -q "https://ghproxy.com/${URL}"

          tar -xzf "$FILE"
          chmod +x gost

          echo "🚀 启动 GOST..."
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &

          sleep 3

          echo "🌐 测试代理..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org || echo "❌ 代理失败"

      # ===============================
      # 🚀 执行脚本
      # ===============================
      - name: 🚀 运行续期脚本
        env:
          DISCORD_ACCOUNT: ${{ secrets.DISCORD_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          HTTP_PROXY: http://127.0.0.1:8080
          HTTPS_PROXY: http://127.0.0.1:8080
        run: |
          echo "🌍 当前出口IP:"
          curl -s https://api.ipify.org || true
          echo

          npx playwright test

      # ===============================
      # 📜 调试
      # ===============================
      - name: 📜 输出 GOST 日志
        if: failure()
        run: |
          echo "===== gost.log ====="
          cat gost.log || true

      - name: 📦 上传失败截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            test-results/
            playwright-report/
            gost.log
          retention-days: 7
